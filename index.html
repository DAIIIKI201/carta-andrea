<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Andrea 🖤</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Georgia;
    overflow:hidden;
}

/* 🌑 pantalla inicial */
#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    animation:fadeOut 3s forwards;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* 🌙 luna */
.luna{
    position:absolute;
    top:40px;
    right:60px;
    width:90px;
    height:90px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 60px white;
    opacity:0;
    animation:aparecer 2s 2s forwards;
}

/* ✨ estrellas */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:0.5;
}

/* 🖤 botón */
#btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border:1px solid white;
    padding:15px;
    cursor:pointer;
    letter-spacing:2px;
    opacity:0;
    animation:aparecer 2s 4s forwards;
}

/* 📜 carta */
#carta{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-60%);
    background:#111;
    padding:30px;
    width:85%;
    max-width:600px;
    border-radius:10px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
    opacity:0;
}

.showCarta{
    display:block;
    animation:subir 1.5s forwards;
}

@keyframes subir{
    to{
        opacity:1;
        transform:translate(-50%,-50%);
    }
}

/* ❤️ corazón */
.corazon{
    color:red;
    display:inline-block;
    animation:latido 1s infinite;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.4);}
}

/* animación aparecer */
@keyframes aparecer{
    to{opacity:1;}
}
</style>
</head>

<body>

<div id="overlay"></div>

<div class="luna"></div>

<div id="btn" onclick="abrir()">Abrir carta 🖤</div>

<div id="carta"></div>

<!-- 🎵 música -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a3b4c5c6.mp3?filename=dark-piano-ambient-110624.mp3" type="audio/mp3">
</audio>

<script>
function abrir(){
    document.getElementById("btn").style.display="none";
    let carta = document.getElementById("carta");
    carta.classList.add("showCarta");

    escribirTexto();

    document.getElementById("music").play().catch(()=>{});
}

/* ✍️ texto tipo máquina */
let texto = `
<h2>Para Andrea, el amor de mi vida</h2>
<p>Mi amor hermoso, esta es una carta para ti, para que por medio de estas palabras sientas lo mucho que te amo y todo lo que daría por ti. Estoy completamente enamorado, locamente enamorado de ti, y realmente quiero estar contigo por toda mi eternidad.</p>
<p>Quiero ser esa persona de apoyo para ti, en la que puedas contar con todo. Todo lo que vendrá en el futuro para nuestras vidas será muy próspero y especial. Yo sé que mañana te irá excelente en la entrevista y que vas a quedar.</p>
<p>Tú eres la mejor, mi vida, y valoro absolutamente todo lo que haces, todo lo que has hecho y lo mucho que te esfuerzas cada día. De verdad, me haces muy feliz y me siento orgulloso de ti.</p>
<p>Quiero decirte que me encantas demasiado y nunca dejaré de sentir esto tan puro y completamente especial que siento por ti.</p>
<p>Te amé ayer, te amo hoy y te amaré por todas nuestras vidas.</p>
<p style="text-align:right;">Att: tu pingüinito <span class="corazon">❤️</span></p>
`;

function escribirTexto(){
    let i=0;
    let speed=15;
    let carta = document.getElementById("carta");
    carta.innerHTML="";

    function escribir(){
        if(i < texto.length){
            carta.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, speed);
        }
    }
    escribir();
}

/* estrellas */
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
}

/* animación estrellas */
setInterval(()=>{
    document.querySelectorAll(".star").forEach(s=>{
        s.style.opacity=Math.random();
    });
},300);
</script>

</body>
</html>
